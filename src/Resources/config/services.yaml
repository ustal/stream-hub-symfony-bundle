services:
  _defaults:
    autowire: true
    autoconfigure: true

  Ustal\StreamHub\SymfonyBundle\:
    resource: '../../'
    exclude:
      - '../../Command/'
      - '../../Context/'
      - '../../DependencyInjection/'
      - '../../Factory/'
      - '../../Render/'
      - '../../Resources/'
      - '../../Tests/'

  Ustal\StreamHub\SymfonyBundle\StreamHubBundle:
    public: true

  stream_hub.identifier_generator.random_hex:
    class: Ustal\StreamHub\Component\Identifier\Generator\RandomHexIdentifierGenerator

  stream_hub.identifier_generator.uuid_v4:
    class: Ustal\StreamHub\Component\Identifier\Generator\UuidV4IdentifierGenerator

  stream_hub.identifier_generator.uuid_v7:
    class: Ustal\StreamHub\Component\Identifier\Generator\UuidV7IdentifierGenerator
